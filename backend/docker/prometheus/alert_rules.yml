# Prometheus Alerting Rules
# SuperMalle Restaurant System

groups:
  - name: supermalle_alerts
    interval: 30s
    rules:
      # JVM Memory Alerts
      - alert: HighHeapMemoryUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: jvm
        annotations:
          summary: "High heap memory usage detected"
          description: "Heap memory usage is above 80% for 5 minutes (current: {{ $value }}%)"

      - alert: CriticalHeapMemoryUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} * 100 > 90
        for: 2m
        labels:
          severity: critical
          component: jvm
        annotations:
          summary: "Critical heap memory usage detected"
          description: "Heap memory usage is above 90% for 2 minutes (current: {{ $value }}%)"

      # Thread Alerts
      - alert: HighThreadCount
        expr: jvm_threads_live_threads > 200
        for: 5m
        labels:
          severity: warning
          component: jvm
        annotations:
          summary: "High thread count detected"
          description: "Thread count is above 200 for 5 minutes (current: {{ $value }})"

      # HTTP Request Alerts
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) * 100 > 5
        for: 5m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "High HTTP error rate detected"
          description: "HTTP error rate is above 5% for 5 minutes (current: {{ $value }}%)"

      - alert: CriticalErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) * 100 > 10
        for: 2m
        labels:
          severity: critical
          component: http
        annotations:
          summary: "Critical HTTP error rate detected"
          description: "HTTP error rate is above 10% for 2 minutes (current: {{ $value }}%)"

      - alert: HighResponseTime
        expr: rate(http_server_requests_seconds_sum[5m]) / rate(http_server_requests_seconds_count[5m]) > 1
        for: 5m
        labels:
          severity: warning
          component: http
        annotations:
          summary: "High HTTP response time detected"
          description: "HTTP response time is above 1 second for 5 minutes (current: {{ $value }}s)"

      # Database Connection Pool Alerts
      - alert: HighDatabaseConnectionUsage
        expr: hikaricp_connections_active / hikaricp_connections_max * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connection usage detected"
          description: "Database connection usage is above 80% for 5 minutes (current: {{ $value }}%)"

      - alert: CriticalDatabaseConnectionUsage
        expr: hikaricp_connections_active / hikaricp_connections_max * 100 > 90
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Critical database connection usage detected"
          description: "Database connection usage is above 90% for 2 minutes (current: {{ $value }}%)"

      # Circuit Breaker Alerts
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: warning
          component: circuitbreaker
        annotations:
          summary: "Circuit breaker is open"
          description: "Circuit breaker {{ $labels.name }} is open for 1 minute"

      - alert: CircuitBreakerOpenLong
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 10m
        labels:
          severity: critical
          component: circuitbreaker
        annotations:
          summary: "Circuit breaker is open for too long"
          description: "Circuit breaker {{ $labels.name }} is open for 10 minutes"

      # Application Down Alerts
      - alert: ApplicationDown
        expr: up{job="supermalle"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Application is down"
          description: "SuperMalle application is down for 1 minute"

      # Business Metrics Alerts
      - alert: LowOrderRate
        expr: rate(orders_created[5m]) < 0.1
        for: 15m
        labels:
          severity: info
          component: business
        annotations:
          summary: "Low order rate detected"
          description: "Order rate is below 0.1 orders per minute for 15 minutes (current: {{ $value }} orders/min)"

      - alert: HighPaymentFailureRate
        expr: rate(payments_failure[5m]) / rate(payments_success[5m] + payments_failure[5m]) * 100 > 10
        for: 5m
        labels:
          severity: warning
          component: payment
        annotations:
          summary: "High payment failure rate detected"
          description: "Payment failure rate is above 10% for 5 minutes (current: {{ $value }}%)"
