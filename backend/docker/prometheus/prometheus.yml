# Prometheus Configuration
# SuperMalle Restaurant System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'supermalle-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot application metrics
  - job_name: 'supermalle'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'supermalle'
          environment: 'production'

  # PostgreSQL metrics (if postgres_exporter is used)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          application: 'postgres'

  # Redis metrics (if redis_exporter is used)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          application: 'redis'

  # RabbitMQ metrics (if rabbitmq_exporter is used)
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15672']
        labels:
          application: 'rabbitmq'
