<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status Update</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #FF9800; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
        .status-badge { display: inline-block; padding: 6px 16px; background-color: #4CAF50; color: white; border-radius: 20px; font-weight: bold; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Order Status Update</h1>
    </div>
    <div class="content">
        <p th:if="${name}">Hello <span th:text="${name}">Customer</span>,</p>
        <p th:unless="${name}">Hello,</p>
        <p>Your order <strong th:text="${orderNumber}">#ORD-12345</strong> has been updated:</p>
        <p style="text-align: center; margin: 20px 0;">
            <span class="status-badge" th:text="${status}">PREPARING</span>
        </p>
        <p th:if="${message}" th:text="${message}">Your order is being prepared.</p>
        <p>You can track your order in real-time from your account.</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 <span th:text="${restaurantName}">Restaurant</span>. All rights reserved.</p>
    </div>
</body>
</html>
