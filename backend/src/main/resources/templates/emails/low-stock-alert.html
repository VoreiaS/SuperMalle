<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Stock Alert</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #f44336; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
        .alert-details { background-color: white; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #f44336; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Low Stock Alert</h1>
    </div>
    <div class="content">
        <p>Hello Admin,</p>
        <div class="alert-details">
            <p><strong>Item:</strong> <span th:text="${menuItemName}">Item Name</span></p>
            <p><strong>Current Quantity:</strong> <span th:text="${currentQuantity}">0</span></p>
            <p><strong>Reorder Level:</strong> <span th:text="${reorderLevel}">10</span></p>
        </div>
        <p>Please place a restock order for this item as soon as possible to avoid stockouts.</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 <span th:text="${restaurantName}">Restaurant</span>. All rights reserved.</p>
        <p>This is an automated alert from the inventory management system.</p>
    </div>
</body>
</html>
