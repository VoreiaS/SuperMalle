<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyalty Points Earned</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #9C27B0; color: white; padding: 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { background-color: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-top: none; }
        .points-display { text-align: center; margin: 20px 0; }
        .points-earned { font-size: 2em; font-weight: bold; color: #9C27B0; }
        .points-balance { font-size: 1.2em; color: #666; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>You Earned Points!</h1>
    </div>
    <div class="content">
        <p>Hello <span th:text="${name}">Valued Customer</span>,</p>
        <p>Thank you for your recent order! You've earned loyalty points:</p>
        <div class="points-display">
            <div class="points-earned" th:text="${ '+' + points}">+100</div>
            <div class="points-balance">Your new balance: <span th:text="${newBalance}">500</span> points</div>
        </div>
        <p>Keep ordering to unlock higher tiers and earn even more points with our multiplier bonuses!</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 <span th:text="${restaurantName}">Restaurant</span>. All rights reserved.</p>
    </div>
</body>
</html>
