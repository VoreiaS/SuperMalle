server:
  port: 8080

spring:
  application:
    name: superMalle
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/supermalle
    username: ${DB_USERNAME:supermalle}
    password: ${DB_PASSWORD:supermalle123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:true}
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 1
        default-requeue-rejected: false

# Email Configuration
app:
  email:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:your-email@gmail.com}
    password: ${EMAIL_PASSWORD:your-app-password}
    protocol: smtp
    tls: true
    auth: true
    from: ${EMAIL_FROM:noreply@supermalle.com}
    from-name: ${EMAIL_FROM_NAME:SuperMalle Restaurant}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://localhost:3000,http://localhost:5173,http://localhost:5175,http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:superMalleSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
    expiration: ${JWT_EXPIRATION:900000}  # 15 minutes in milliseconds
  stripe:
    secret-key: ${STRIPE_API_KEY:sk_test_your_stripe_api_key}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}
  order:
    auto-cancel-minutes: ${AUTO_CANCEL_MINUTES:30}
    auto-cancel-interval-ms: ${AUTO_CANCEL_INTERVAL_MS:300000}
  admin:
    email: ${ADMIN_EMAIL:admin@supermalle.com}
    password: ${ADMIN_PASSWORD:Admin@2026!}
  restaurant:
    tax-rate: 0.08
    tax-rates:
      STANDARD: 0.08
      ALCOHOL: 0.10
      PREPARED_FOOD: 0.08
      GROCERY: 0.0
    delivery-charge: 5.00
    name: ${RESTAURANT_NAME:SuperMalle Restaurant}
    phone: ${RESTAURANT_PHONE:+1-555-123-4567}
    address: ${RESTAURANT_ADDRESS:123 Main St, City, State 12345}

  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

# Rate Limiting Configuration
rate:
  limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    default:
      requests: ${RATE_LIMIT_DEFAULT_REQUESTS:100}
      duration: ${RATE_LIMIT_DEFAULT_DURATION:1}
    admin:
      requests: ${RATE_LIMIT_ADMIN_REQUESTS:1000}
    staff:
      requests: ${RATE_LIMIT_STAFF_REQUESTS:500}
    customer:
      requests: ${RATE_LIMIT_CUSTOMER_REQUESTS:100}

# Encryption Configuration
encryption:
  key: ${ENCRYPTION_KEY:}  # Base64-encoded 256-bit key (generate with AESUtil.generateKey())

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        sliding-window-type: count_based
        minimum-number-of-calls: 5
    instances:
      stripeCircuitBreaker:
        base-config: default
      emailCircuitBreaker:
        base-config: default
      notificationCircuitBreaker:
        base-config: default
      databaseCircuitBreaker:
        base-config: default
      externalApiCircuitBreaker:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.lang.Exception
    instances:
      stripeRetry:
        base-config: default
      emailRetry:
        base-config: default
      notificationRetry:
        base-config: default
      databaseRetry:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      stripeTimeLimiter:
        timeout-duration: 10s
      emailTimeLimiter:
        timeout-duration: 30s
      databaseTimeLimiter:
        timeout-duration: 5s

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.example.superMalle: DEBUG
    com.stripe: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
